syntax = "proto3";

package book.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";

option go_package = "github.com/DgHnG36/lib-management-system/shared/go/v1/book;bookv1";

service BookService {
    rpc GetBook(GetBookRequest) returns (BookResponse);
    rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
    rpc CreateBooks(CreateBooksRequest) returns (CreateBooksResponse);
    rpc UpdateBook(UpdateBookRequest) returns (BookResponse);
    rpc DeleteBooks(DeleteBooksRequest) returns (common.v1.BaseResponse);
    rpc CheckAvailability(CheckAvailabilityRequest) returns (CheckAvailabilityResponse);
    rpc UpdateBookQuantity(UpdateBookQuantityRequest) returns (UpdateBookQuantityResponse);
}

message Book {
    string id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    string category = 5;
    string description = 6;
    int32 total_quantity = 7;
    int32 available_quantity = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

message BookResponse {
    Book book = 1;
}

message GetBookRequest {
    oneof identifier {
        string id = 1;
        string title = 2;
    }
}

message ListBooksRequest {
    common.v1.PaginationRequest pagination = 1;
    string search_query = 2;
    string category = 3;
}

message ListBooksResponse {
    repeated Book books = 1;
    int32 total_count = 2;
}

message CreateBookPayload {
    string title = 1;
    string author = 2;
    string isbn = 3;
    string category = 4;
    string description = 5;
    int32 total_quantity = 6;
}

message CreateBooksRequest {
    repeated CreateBookPayload books = 1;
}

message CreateBooksResponse {
    repeated Book books = 1;
    int32 success_count = 2; 
}

message UpdateBookRequest {
    string id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    string category = 5;
    string description = 6;
}

message DeleteBooksRequest {
    repeated string ids = 1;
}

message CheckAvailabilityRequest {
    string book_id = 1;
}

message CheckAvailabilityResponse {
    bool is_available = 1;
    int32 available_quantity = 2;
}

message UpdateBookQuantityRequest {
    string book_id = 1;
    int32 change_amount = 2;
}

message UpdateBookQuantityResponse {
    bool success = 1;
    string message = 2;
    int32 new_available_quantity = 3;
}