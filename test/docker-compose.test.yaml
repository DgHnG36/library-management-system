services:
  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_user_db
    ports:
      - "15432:5432"
    volumes:
      - "postgres_user_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_user_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
  postgres-book:
    image: postgres:15-alpine
    container_name: postgres-book
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_book_db
    ports:
      - "15433:5432"
    volumes:
      - "postgres_book_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_book_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_order_db
    ports:
      - "15434:5432"
    volumes:
     - "postgres_order_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "63379:6379"
    volumes:
     - "redis_data:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: lms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms-network
  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: lms-user-service
    ports:
      - "40041:40041"
    environment:
      APP_NAME: lms-user-service
      APP_ENV: development
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40041"
      DB_HOST: postgres-user
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_user_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "100"
      DB_MAX_IDLE_CONNS: "100"
      DB_CONN_MAX_LIFETIME: "5m"
      JWT_SECRET: local-lms-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXP_MINS: "60m"
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^user-service$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
 
  book-service:
    build:
      context: ..
      dockerfile: services/book-service/Dockerfile
    container_name: lms-book-service
    ports:
      - "40042:40042"
    environment:
      APP_NAME: lms-book-service
      APP_ENV: development
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40042"
      DB_HOST: postgres-book
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_book_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "50"
      DB_MAX_IDLE_CONNS: "50"
      DB_CONN_MAX_LIFETIME: "5m"
    depends_on:
      postgres-book:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^book-service$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
 
  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    container_name: lms-order-service
    ports:
      - "40043:40043"
    environment:
      APP_NAME: lms-order-service
      APP_ENV: development
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40043"
      DB_HOST: postgres-order
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_order_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "10"
      DB_CONN_MAX_LIFETIME: "5m"
      USER_SERVICE_ADDR: user-service:40041
      BOOK_SERVICE_ADDR: book-service:40042
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: order-events
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      book-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^order-service$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
 
  gateway-service:
    build:
      context: ..
      dockerfile: services/gateway-service/Dockerfile
    container_name: lms-gateway-service
    ports:
      - "8080:8080"
    environment:
      APP_NAME: lms-gateway-service
      APP_ENV: development
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_READ_TIMEOUT: "30s"
      SERVER_WRITE_TIMEOUT: "30s"
      SERVER_IDLE_TIMEOUT: "60s"
      JWT_SECRET: local-lms-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXP_MINS: "60m"
      GRPC_USER_SERVICE_ADDR: user-service:40041
      GRPC_BOOK_SERVICE_ADDR: book-service:40042
      GRPC_ORDER_SERVICE_ADDR: order-service:40043
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RATE_LIMIT_MAX_REQUESTS: "1000"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      CORS_MAX_AGE: "3600"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      book-service:
        condition: service_started
      order-service:
        condition: service_started
    restart: on-failure
    networks:
      - lms-network
 
  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: lms-notification-service
    environment:
      ENV: development
      PORT: "8000"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: order-events
      RABBITMQ_QUEUE: notification-queue
      USER_SVC_ADDR: user-service:40041
      BOOK_SVC_ADDR: book-service:40042
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      SES_SENDER_EMAIL: noreply@localhost
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      book-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^python$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
volumes:
  postgres_user_data:
  postgres_book_data:
  postgres_order_data:
  redis_data:
  rabbitmq_data:
networks:
  lms-network:
    driver: bridge
  

    
      