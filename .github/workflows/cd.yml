name: CD LMS Pipeline

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (leave empty to use latest main)"
        required: false
        default: ""
  workflow_run:
    workflows: ["CI LMS Pipeline"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    # Only build when triggered manually — CI already pushes images via push-images job
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
    strategy:
      matrix:
        service:
          [
            gateway-service,
            user-service,
            book-service,
            order-service,
            notification-service,
          ]
    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          SHA="${{ github.event.inputs.sha }}"
          SHA=${SHA:-${{ github.sha }}}
          echo "SHA=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.SHA }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${SHA::7}" >> $GITHUB_OUTPUT
        env:
          SHA: ${{ steps.sha.outputs.SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/lms-${{ matrix.service }}:${{ steps.vars.outputs.TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
    steps:
      - name: Set image tag from CI SHA
        id: vars
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "TAG=${SHA::7}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, resolve-tag]
    if: |
      always() && (
        (needs.build-and-push.result == 'success') ||
        (needs.resolve-tag.result == 'success')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz"
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Update image tags
        env:
          TAG: ${{ needs.build-and-push.outputs.tag || needs.resolve-tag.outputs.tag }}
        run: |
          cd k8s/overlays/prod
          kustomize edit set image \
            lms/gateway-service=${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/lms-gateway-service:${TAG} \
            lms/user-service=${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/lms-user-service:${TAG} \
            lms/book-service=${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/lms-book-service:${TAG} \
            lms/order-service=${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/lms-order-service:${TAG} \
            lms/notification-service=${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/lms-notification-service:${TAG}

      - name: Generate prod secret env files
        env:
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          PROD_REDIS_PASSWORD: ${{ secrets.PROD_REDIS_PASSWORD }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_SQS_QUEUE_URL: ${{ secrets.PROD_SQS_QUEUE_URL }}
          PROD_AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          PROD_AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p k8s/overlays/prod/secrets

          printf 'JWT_SECRET=%s\nREDIS_PASSWORD=%s\n' \
            "$PROD_JWT_SECRET" "$PROD_REDIS_PASSWORD" \
            > k8s/overlays/prod/secrets/gateway.env

          printf 'JWT_SECRET=%s\nDB_PASSWORD=%s\n' \
            "$PROD_JWT_SECRET" "$PROD_DB_PASSWORD" \
            > k8s/overlays/prod/secrets/user.env

          printf 'DB_PASSWORD=%s\n' \
            "$PROD_DB_PASSWORD" \
            > k8s/overlays/prod/secrets/book.env

          printf 'DB_PASSWORD=%s\nSQS_QUEUE_URL=%s\n' \
            "$PROD_DB_PASSWORD" "$PROD_SQS_QUEUE_URL" \
            > k8s/overlays/prod/secrets/order.env

          printf 'SQS_QUEUE_URL=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\n' \
            "$PROD_SQS_QUEUE_URL" "$PROD_AWS_ACCESS_KEY_ID" "$PROD_AWS_SECRET_ACCESS_KEY" \
            > k8s/overlays/prod/secrets/notification.env

          printf 'REDIS_PASSWORD=%s\n' \
            "$PROD_REDIS_PASSWORD" \
            > k8s/overlays/prod/secrets/redis.env

          printf 'POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=%s\n' \
            "$PROD_DB_PASSWORD" \
            > k8s/overlays/prod/secrets/postgres.env

          printf 'RABBITMQ_DEFAULT_USER=guest\nRABBITMQ_DEFAULT_PASS=guest\n' \
            > k8s/overlays/prod/secrets/rabbitmq.env

      - name: Ensure SQS queue exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
        run: |
          aws sqs create-queue \
            --queue-name notification-queue \
            --attributes VisibilityTimeout=30,MessageRetentionPeriod=86400
          echo "SQS queue is ready."

      - name: Apply kustomization
        run: |
          kubectl create namespace lms --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/overlays/prod

      - name: Ensure RDS databases exist
        env:
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          RDS_HOST: db-instance-aws.cr6s8q0wa2an.ap-southeast-2.rds.amazonaws.com
        run: |
          kubectl run rds-init --restart=Never --rm -i \
            --image=postgres:16-alpine \
            --namespace=lms \
            --env="PGPASSWORD=${PROD_DB_PASSWORD}" \
            --env="RDS_HOST=${RDS_HOST}" \
            --command -- sh -c \
            'psql -h "$RDS_HOST" -U postgres -c "SELECT 1" > /dev/null
            for db in lms_user_db lms_book_db lms_order_db; do
              if psql -h "$RDS_HOST" -U postgres -lqt | grep -qw "$db"; then
                echo "$db: already exists, skipping"
              else
                psql -h "$RDS_HOST" -U postgres -c "CREATE DATABASE $db"
                echo "$db: created"
              fi
            done'
          echo "All RDS databases are ready."

      - name: Wait for rollout
        run: |
          FAILED=""
          for svc in gateway-service user-service book-service order-service notification-service; do
            if ! kubectl rollout status deployment/lms-${svc} -n lms --timeout=180s; then
              FAILED="$FAILED $svc"
            fi
          done
          if [[ -n "$FAILED" ]]; then
            echo "::error::Rollout failed for:$FAILED"
            exit 1
          fi

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "%%% Pod status %%%%"
          kubectl get pods -n lms -o wide
          declare -A APP_LABEL=(
            [gateway-service]=gateway
            [user-service]=user
            [book-service]=book
            [order-service]=order
            [notification-service]=notification
          )
          for svc in gateway-service user-service book-service order-service notification-service; do
            echo ""
            echo "%%% $svc %%%%"
            kubectl describe deployment/lms-${svc} -n lms 2>/dev/null | tail -20 || true
            LABEL="${APP_LABEL[$svc]}"
            POD=$(kubectl get pod -n lms -l app=${LABEL} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [[ -n "$POD" ]]; then
              echo "--- logs: $POD ---"
              kubectl logs -n lms "$POD" --tail=50 2>/dev/null || true
              kubectl describe pod -n lms "$POD" 2>/dev/null | grep -A10 'Events:' || true
            fi
          done

      - name: Rollback on failure
        if: failure()
        run: |
          for svc in gateway-service user-service book-service order-service notification-service; do
            READY=$(kubectl get deployment/lms-${svc} -n lms -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo 0)
            DESIRED=$(kubectl get deployment/lms-${svc} -n lms -o jsonpath='{.spec.replicas}' 2>/dev/null || echo 1)
            if [[ "$READY" -lt "$DESIRED" ]]; then
              echo "Rolling back lms-${svc} (ready=$READY desired=$DESIRED)"
              kubectl rollout undo deployment/lms-${svc} -n lms || true
            fi
          done
