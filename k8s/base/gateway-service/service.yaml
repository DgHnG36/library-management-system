apiVersion: v1
kind: Service
metadata:
  name: lms-gateway-service
  labels:
    app: gateway
    tier: api
spec:
  # ClusterIP for internal cluster routing; use Ingress for external access.
  # Change to LoadBalancer or NodePort in overlays if no Ingress controller.
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
