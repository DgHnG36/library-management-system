apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-gateway-service
  labels:
    app: gateway
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: api
    spec:
      containers:
        - name: gateway-service
          image: lms/gateway-service:latest # TODO: replace with actual registry/image:tag
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lms-gateway-config # non-sensitive vars from configmap.yaml
            - secretRef:
                name: lms-gateway-secret # sensitive vars from secrets.yaml
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthy
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
