apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-redis
  labels:
    app: redis
    tier: cache
spec:
  # Single replica — rate limiting data
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command: ["redis-server"]
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "128mb"
            # Evict keys when max memory is reached, since this is a cache and we prefer availability over strict consistency
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - "" # Turn off persistence since data is ephemeral
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lms-redis-secret
                  key: REDIS_PASSWORD
                  optional: true
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "160Mi"
