apiVersion: v1
kind: Service
metadata:
  name: lms-rabbitmq
  labels:
    app: rabbitmq
    tier: broker
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
    - name: management
      protocol: TCP
      port: 15672
      targetPort: 15672
