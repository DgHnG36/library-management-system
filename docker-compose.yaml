services:
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_user_db
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
  postgres-book:
    image: postgres:16-alpine
    container_name: postgres-book
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_book_db
    volumes:
      - postgres_book_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_order_db
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network
  user-service:
    image: dghug6305/lms-user-service:latest
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: lms-user-service
    ports:
      - "40041:40041"
    environment:
      APP_NAME: lms-user-service
      APP_ENV: production
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40041"
      DB_HOST: postgres-user
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_user_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "100"
      DB_MAX_IDLE_CONNS: "100"
      DB_CONN_MAX_LIFETIME: "5m"
      JWT_SECRET: "prod-jwt-secret"
      JWT_ALGORITHM: HS256
      JWT_EXP_MINS: "240m"
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^user-service$$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
  book-service:
    image: dghug6305/lms-book-service:latest
    build:
      context: .
      dockerfile: services/book-service/Dockerfile
    container_name: lms-book-service
    ports:
      - "40042:40042"
    environment:
      APP_NAME: lms-book-service
      APP_ENV: production
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40042"
      DB_HOST: postgres-book
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_book_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "100"
      DB_MAX_IDLE_CONNS: "100"
      DB_CONN_MAX_LIFETIME: "5m"
    depends_on:
      postgres-book:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^book-service$$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
  order-service:
    image: dghug6305/lms-order-service:latest
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: lms-order-service
    ports:
      - "40043:40043"
    environment:
      APP_NAME: lms-order-service
      APP_ENV: production
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "40043"
      DB_HOST: postgres-order
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lms_order_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: "100"
      DB_MAX_IDLE_CONNS: "100"
      DB_CONN_MAX_LIFETIME: "5m"
      USER_SERVICE_ADDR: user-service:40041
      BOOK_SERVICE_ADDR: book-service:40042
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: order-events
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^order-service$$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
  gateway-service:
    image: dghug6305/lms-gateway-service:latest
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: lms-gateway-service
    ports:
      - "8080:8080"
    environment:
      APP_NAME: lms-gateway-service
      APP_ENV: production
      APP_VERSION: "1.0.0"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_READ_TIMEOUT: "30s"
      SERVER_WRITE_TIMEOUT: "30s"
      SERVER_IDLE_TIMEOUT: "60s"
      JWT_SECRET: local-lms-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXP_MINS: "240m"
      GRPC_USER_SERVICE_ADDR: user-service:40041
      GRPC_BOOK_SERVICE_ADDR: book-service:40042
      GRPC_ORDER_SERVICE_ADDR: order-service:40043
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RATE_LIMIT_MAX_REQUESTS: "50000"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      CORS_MAX_AGE: "3600"
    depends_on:
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q '^gateway-service$$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    networks:
      - lms-network
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: dghug6305/lms-notification-service:latest
    pull_policy: never
    container_name: lms-notification-service
    environment:
      ENV: production
      PORT: "8000"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: order-events
      RABBITMQ_QUEUE: notification-queue
      GRPC_USER_SERVICE_ADDR: user-service:40041
      GRPC_BOOK_SERVICE_ADDR: book-service:40042
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      SES_SENDER_EMAIL: noreply@localhost
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: on-failure
    networks:
      - lms-network

volumes:
  postgres_user_data:
  postgres_book_data:
  postgres_order_data:
  redis_data:
  rabbitmq_data:

networks:
  lms-network:
    driver: bridge
    
